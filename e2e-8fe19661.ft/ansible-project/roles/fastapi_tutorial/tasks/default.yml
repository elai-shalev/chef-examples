---
- name: Install Python 3 and required system packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: "{{ fastapi_app_path }}"
    owner: "{{ fastapi_service_user }}"
    group: "{{ fastapi_service_group }}"
    mode: "0755"
    state: directory
    recurse: true
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: "{{ fastapi_git_repo }}"
    dest: "{{ fastapi_app_path }}"
    version: "{{ fastapi_git_branch }}"
    update: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ fastapi_app_path }}/venv
    creates: "{{ fastapi_app_path }}/venv"
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ fastapi_app_path }}/requirements.txt"
    virtualenv: "{{ fastapi_app_path }}/venv"
    state: present
- name: Configure PostgreSQL service
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
- name: Create database user
  community.postgresql.postgresql_user:
    name: "{{ fastapi_db_user }}"
    password: "{{ fastapi_db_password }}"
    state: present
  become: true
  become_user: postgres
- name: Create database
  community.postgresql.postgresql_db:
    name: "{{ fastapi_db_name }}"
    owner: "{{ fastapi_db_user }}"
    state: present
  become: true
  become_user: postgres
- name: Grant privileges on database
  community.postgresql.postgresql_privs:
    db: "{{ fastapi_db_name }}"
    role: "{{ fastapi_db_user }}"
    type: database
    privs: ALL
    state: present
  become: true
  become_user: postgres
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ fastapi_app_path }}/.env"
    mode: "0644"
    owner: "{{ fastapi_service_user }}"
    group: "{{ fastapi_service_group }}"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd daemon
- name: Enable and start the FastAPI service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true
