---
- name: Stop and disable default OS Redis service on Debian/Ubuntu
  ansible.builtin.service:
    name: redis-server
    state: stopped
    enabled: false
  ignore_errors: true
  when: ansible_os_family == "Debian"
- name: Stop and disable default OS Redis service on RedHat/CentOS
  ansible.builtin.service:
    name: redis
    state: stopped
    enabled: false
  ignore_errors: true
  when: ansible_os_family == "RedHat"
