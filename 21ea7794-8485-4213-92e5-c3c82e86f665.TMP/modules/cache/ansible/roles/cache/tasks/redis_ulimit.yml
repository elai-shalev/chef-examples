---
- name: Configure PAM limits for Redis on Debian/Ubuntu
  ansible.builtin.template:
    src: pam_limits.conf.j2
    dest: /etc/pam.d/su
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == "Debian"
  tags:
    - redis
    - cache
- name: Configure sudo PAM limits for Redis on Debian/Ubuntu
  ansible.builtin.copy:
    content: "#%PAM-1.0\nauth       sufficient pam_rootok.so\nauth       required   pam_unix.so\naccount    required   pam_unix.so\nsession    required   pam_unix.so\n\
      session    required   pam_limits.so\n"
    dest: /etc/pam.d/sudo
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == "Debian"
  tags:
    - redis
    - cache
- name: Set Redis user limits
  community.general.pam_limits:
    domain: "{{ redis_user }}"
    limit_type: soft
    limit_item: nofile
    value: 65536
  tags:
    - redis
    - cache
- name: Set Redis user limits (hard)
  community.general.pam_limits:
    domain: "{{ redis_user }}"
    limit_type: hard
    limit_item: nofile
    value: 65536
  tags:
    - redis
    - cache
