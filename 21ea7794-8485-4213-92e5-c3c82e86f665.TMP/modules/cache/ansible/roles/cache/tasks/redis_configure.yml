---
- name: Create Redis configuration file
  ansible.builtin.template:
    src: redis.conf.j2
    dest: "{{ redis_conf_dir }}/{{ item.port }}.conf"
    owner: "{{ redis_user }}"
    group: "{{ redis_group }}"
    mode: "0644"
  loop: "{{ redis_instances }}"
  notify: restart redis
  tags:
    - redis
    - cache
- name: Create Redis systemd service file
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /etc/systemd/system/redis@.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_service_mgr == 'systemd'
  notify:
    - restart redis
  tags:
    - redis
    - cache
- name: Create Redis init script
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis{{ item.port }}
    owner: root
    group: root
    mode: "0755"
  loop: "{{ redis_instances }}"
  when: ansible_service_mgr == 'sysvinit'
  notify:
    - restart redis non-systemd
  tags:
    - redis
    - cache
- name: Create Redis upstart configuration
  ansible.builtin.template:
    src: redis.upstart.conf.j2
    dest: /etc/init/redis{{ item.port }}.conf
    owner: root
    group: root
    mode: "0644"
  loop: "{{ redis_instances }}"
  when: ansible_service_mgr == 'upstart'
  notify:
    - restart redis non-systemd
  tags:
    - redis
    - cache
