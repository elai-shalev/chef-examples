---
- name: Restart Redis
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  with_items:
    - redis@{{ redis_port | default('6379') }}
    - redis{{ redis_port | default('6379') }}
  failed_when: false
- name: Restart Redis Sentinel
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  with_items:
    - redis-sentinel@{{ redis_sentinel_port | default('26379') }}
    - redis-sentinel{{ redis_sentinel_port | default('26379') }}
  failed_when: false
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
