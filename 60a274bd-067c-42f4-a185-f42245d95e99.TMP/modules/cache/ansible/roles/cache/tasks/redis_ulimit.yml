---
- name: Create Redis limits file
  ansible.builtin.template:
    src: redis-limits.conf.j2
    dest: /etc/security/limits.d/redis.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart redis
- name: Create Redis PAM configuration
  ansible.builtin.copy:
    dest: /etc/pam.d/redis
    content: "# /etc/pam.d/redis - PAM configuration for Redis\n# Generated by Ansible\n\nsession    required     pam_limits.so\n"
    owner: root
    group: root
    mode: "0644"
  notify: restart redis
