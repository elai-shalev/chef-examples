---
- name: Create Redis Sentinel configuration directory
  ansible.builtin.file:
    path: /etc/redis-sentinel
    state: directory
    owner: redis
    group: redis
    mode: "0755"
- name: Create Redis Sentinel configuration file
  ansible.builtin.template:
    src: sentinel.conf.j2
    dest: /etc/redis-sentinel/{{ redis_sentinel_port | default('26379') }}.conf
    owner: redis
    group: redis
    mode: "0644"
  notify: restart redis sentinel
- name: Detect init system
  ansible.builtin.command: ps -p 1 -o comm=
  register: init_system
  changed_when: false
  check_mode: false
- name: Create systemd service file for Sentinel
  ansible.builtin.template:
    src: redis-sentinel@.service.j2
    dest: /etc/systemd/system/redis-sentinel@.service
    owner: root
    group: root
    mode: "0644"
  when: init_system.stdout == 'systemd'
  notify: reload systemd
- name: Create init script for Sentinel
  ansible.builtin.template:
    src: sentinel.init.j2
    dest: /etc/init.d/redis-sentinel{{ redis_sentinel_port | default('26379') }}
    owner: root
    group: root
    mode: "0755"
  when: init_system.stdout == 'init'
  notify: restart redis sentinel
- name: Create upstart configuration for Sentinel
  ansible.builtin.template:
    src: sentinel.upstart.conf.j2
    dest: /etc/init/redis-sentinel{{ redis_sentinel_port | default('26379') }}.conf
    owner: root
    group: root
    mode: "0644"
  when: init_system.stdout == 'upstart'
  notify: restart redis sentinel
- name: Enable and start Redis Sentinel service (systemd)
  ansible.builtin.systemd:
    name: redis-sentinel@{{ redis_sentinel_port | default('26379') }}
    state: started
    enabled: true
  when: init_system.stdout == 'systemd' and redis_sentinel_enabled | default(true)
- name: Enable and start Redis Sentinel service (init/upstart)
  ansible.builtin.service:
    name: redis-sentinel{{ redis_sentinel_port | default('26379') }}
    state: started
    enabled: true
  when: (init_system.stdout == 'init' or init_system.stdout == 'upstart') and redis_sentinel_enabled | default(true)
