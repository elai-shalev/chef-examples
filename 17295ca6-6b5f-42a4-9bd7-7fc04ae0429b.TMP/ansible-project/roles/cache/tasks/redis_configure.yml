---
- name: Ensure Redis user and group exist
  ansible.builtin.user:
    name: redis
    system: true
    group: redis
    shell: /bin/false
    home: /var/lib/redis
    createhome: false
- name: Create Redis configuration directory
  ansible.builtin.file:
    path: /etc/redis
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Create Redis data directories
  ansible.builtin.file:
    path: /var/lib/redis/{{ item.port | default('6379') }}
    state: directory
    owner: redis
    group: redis
    mode: "0755"
    recurse: true
  loop: "{{ redis_servers }}"
- name: Create Redis PID directories
  ansible.builtin.file:
    path: /var/run/redis/{{ item.port | default('6379') }}
    state: directory
    owner: redis
    group: redis
    mode: "0755"
    recurse: true
  loop: "{{ redis_servers }}"
- name: Create Redis configuration files
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/{{ item.port | default('6379') }}.conf
    owner: root
    group: root
    mode: "0644"
  loop: "{{ redis_servers }}"
  notify: Restart redis
- name: Check if systemd is available
  ansible.builtin.stat:
    path: /bin/systemctl
  register: systemd_check
- name: Create Redis systemd service files
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /etc/systemd/system/redis@.service
    owner: root
    group: root
    mode: "0644"
  when: systemd_check.stat.exists
  notify: Reload systemd
- name: Create Redis init scripts
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis{{ item.port | default('6379') }}
    owner: root
    group: root
    mode: "0755"
  loop: "{{ redis_servers }}"
  when: not systemd_check.stat.exists and ansible_os_family != "Debian"
  notify: Restart redis
- name: Create Redis upstart scripts
  ansible.builtin.template:
    src: redis.upstart.conf.j2
    dest: /etc/init/redis{{ item.port | default('6379') }}.conf
    owner: root
    group: root
    mode: "0644"
  loop: "{{ redis_servers }}"
  when: not systemd_check.stat.exists and ansible_os_family == "Debian"
  notify: Restart redis
