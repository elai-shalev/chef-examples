---
- name: Check if systemd is available
  ansible.builtin.stat:
    path: /bin/systemctl
  register: systemd_check
- name: Enable and start Redis service (systemd)
  ansible.builtin.systemd:
    name: redis@{{ item.port | default('6379') }}
    state: started
    enabled: true
  loop: "{{ redis_servers }}"
  when: systemd_check.stat.exists
- name: Enable and start Redis service (init)
  ansible.builtin.service:
    name: redis{{ item.port | default('6379') }}
    state: started
    enabled: true
  loop: "{{ redis_servers }}"
  when: not systemd_check.stat.exists
