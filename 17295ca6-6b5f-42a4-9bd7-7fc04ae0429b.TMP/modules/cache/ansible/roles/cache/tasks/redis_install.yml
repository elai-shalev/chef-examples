---
- name: Install Redis from package
  ansible.builtin.package:
    name: redis-server
    state: present
  when: not redis_install_from_source | default(false)
- name: Create Redis download directory
  ansible.builtin.file:
    path: "{{ redis_download_dir | default('/tmp/redis_download') }}"
    state: directory
    mode: "0755"
  when: redis_install_from_source | default(false)
- name: Download Redis source
  ansible.builtin.get_url:
    url: https://download.redis.io/releases/redis-{{ redis_version | default('6.2.6') }}.tar.gz
    dest: "{{ redis_download_dir | default('/tmp/redis_download') }}/redis-{{ redis_version | default('6.2.6') }}.tar.gz"
    mode: "0644"
  when: redis_install_from_source | default(false)
- name: Extract Redis source
  ansible.builtin.unarchive:
    src: "{{ redis_download_dir | default('/tmp/redis_download') }}/redis-{{ redis_version | default('6.2.6') }}.tar.gz"
    dest: "{{ redis_download_dir | default('/tmp/redis_download') }}"
    remote_src: true
  when: redis_install_from_source | default(false)
- name: Compile and install Redis
  ansible.builtin.shell:
    cmd: "cd {{ redis_download_dir | default('/tmp/redis_download') }}/redis-{{ redis_version | default('6.2.6') }}\nmake\nmake install\n"
    creates: /usr/local/bin/redis-server
  when: redis_install_from_source | default(false)
