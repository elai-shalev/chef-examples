---
- name: Install required packages
  ansible.builtin.package:
    name: "{{ required_packages }}"
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    owner: root
    group: root
    mode: "0755"
    state: directory
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_branch }}"
    update: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv "{{ app_dir }}/venv"
    creates: "{{ app_dir }}/venv"
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    state: present
- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
- name: Create PostgreSQL user
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';"
  register: create_user_result
  changed_when: create_user_result.rc == 0
  failed_when: create_user_result.rc != 0 and "already exists" not in create_user_result.stderr
- name: Create PostgreSQL database
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE DATABASE {{ db_name }} OWNER {{ db_user }};"
  register: create_db_result
  changed_when: create_db_result.rc == 0
  failed_when: create_db_result.rc != 0 and "already exists" not in create_db_result.stderr
- name: Grant privileges on database
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_user }};"
  register: grant_privs_result
  changed_when: grant_privs_result.rc == 0
  failed_when: grant_privs_result.rc != 0
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: root
    group: root
    mode: "0644"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
- name: Enable and start FastAPI service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true
