---
- name: Install security packages
  ansible.builtin.package:
    name:
      - fail2ban
      - ufw
      - openssh-server
    state: present
- name: Enable and start fail2ban service
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
- name: Deploy fail2ban configuration
  ansible.builtin.template:
    src: fail2ban.jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban
- name: Create directory for Ansible flag files
  ansible.builtin.file:
    path: /var/lib/ansible
    state: directory
    mode: "0755"
- name: Set UFW default deny
  ansible.builtin.command:
    cmd: ufw --force default deny
  register: ufw_default_deny
  changed_when: ufw_default_deny.rc == 0
  failed_when: ufw_default_deny.rc != 0 and "already" not in ufw_default_deny.stderr
  args:
    creates: /var/lib/ansible/ufw_default_deny
- name: Allow SSH through UFW
  ansible.builtin.command:
    cmd: ufw allow ssh
  register: ufw_allow_ssh
  changed_when: ufw_allow_ssh.rc == 0
  failed_when: ufw_allow_ssh.rc != 0 and "already" not in ufw_allow_ssh.stderr
  args:
    creates: /var/lib/ansible/ufw_allow_ssh
- name: Allow HTTP through UFW
  ansible.builtin.command:
    cmd: ufw allow http
  register: ufw_allow_http
  changed_when: ufw_allow_http.rc == 0
  failed_when: ufw_allow_http.rc != 0 and "already" not in ufw_allow_http.stderr
  args:
    creates: /var/lib/ansible/ufw_allow_http
- name: Allow HTTPS through UFW
  ansible.builtin.command:
    cmd: ufw allow https
  register: ufw_allow_https
  changed_when: ufw_allow_https.rc == 0
  failed_when: ufw_allow_https.rc != 0 and "already" not in ufw_allow_https.stderr
  args:
    creates: /var/lib/ansible/ufw_allow_https
- name: Enable UFW
  ansible.builtin.command:
    cmd: ufw --force enable
  register: ufw_enable
  changed_when: ufw_enable.rc == 0
  failed_when: ufw_enable.rc != 0 and "already" not in ufw_enable.stderr
  args:
    creates: /var/lib/ansible/ufw_enable
- name: Deploy sysctl security configuration
  ansible.builtin.template:
    src: sysctl-security.conf.j2
    dest: /etc/sysctl.d/99-security.conf
    mode: "0644"
  notify: Reload sysctl
- name: Disable root login if configured
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^#?PermitRootLogin
    line: PermitRootLogin no
  when: security.ssh.disable_root | bool
  notify: Restart ssh
- name: Disable password authentication if configured
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^#?PasswordAuthentication
    line: PasswordAuthentication no
  when: not security.ssh.password_auth | bool
  notify: Restart ssh
