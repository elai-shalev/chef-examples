---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    nginx:
      ssl:
        certificate_path: /tmp/molecule_test/etc/ssl/certs
        private_key_path: /tmp/molecule_test/etc/ssl/private
      sites:
        test.cluster.local:
          document_root: /tmp/molecule_test/opt/server/test
          ssl_enabled: true
        ci.cluster.local:
          document_root: /tmp/molecule_test/opt/server/ci
          ssl_enabled: true
        status.cluster.local:
          document_root: /tmp/molecule_test/opt/server/status
          ssl_enabled: true
    security:
      ssh:
        disable_root: true
        password_auth: false
  tasks:
    # Create base directories
    - name: Create base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/nginx
        - /tmp/molecule_test/etc/nginx/sites-available
        - /tmp/molecule_test/etc/nginx/sites-enabled
        - /tmp/molecule_test/etc/nginx/conf.d
        - /tmp/molecule_test/etc/fail2ban
        - /tmp/molecule_test/etc/sysctl.d
        - /tmp/molecule_test/etc/ssl/certs
        - /tmp/molecule_test/etc/ssl/private
        - /tmp/molecule_test/var/lib/ansible
        - /tmp/molecule_test/etc/ssh

    # Create document root directories
    - name: Create document root directories
      ansible.builtin.file:
        path: "{{ item.value.document_root }}"
        state: directory
        mode: "0755"
      loop: "{{ nginx.sites | dict2items }}"

    # Create nginx configuration files
    - name: Create nginx.conf
      ansible.builtin.copy:
        content: |
          user www-data;
          worker_processes auto;
          pid /run/nginx.pid;
          
          events {
            worker_connections 768;
          }
          
          http {
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            keepalive_timeout 65;
            types_hash_max_size 2048;
            
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_prefer_server_ciphers on;
            
            access_log /var/log/nginx/access.log;
            error_log /var/log/nginx/error.log;
            
            gzip on;
            
            include /etc/nginx/conf.d/*.conf;
            include /etc/nginx/sites-enabled/*;
          }
        dest: /tmp/molecule_test/etc/nginx/nginx.conf
        mode: "0644"

    - name: Create security.conf
      ansible.builtin.copy:
        content: |
          # Security settings for Nginx
          server_tokens off;
          
          # Rate limiting
          limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
          
          # SSL settings
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers on;
          ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
          ssl_session_timeout 1d;
          ssl_session_cache shared:SSL:50m;
          ssl_stapling on;
          ssl_stapling_verify on;
        dest: /tmp/molecule_test/etc/nginx/conf.d/security.conf
        mode: "0644"

    # Create site configuration files
    - name: Create site configuration files
      ansible.builtin.copy:
        content: |
          server {
            listen 80;
            server_name {{ item.key }};
            
            # Redirect all HTTP requests to HTTPS
            return 301 https://$host$request_uri;
          }
          
          server {
            listen 443 ssl;
            server_name {{ item.key }};
            
            root {{ item.value.document_root }};
            index index.html;
            
            ssl_certificate {{ nginx.ssl.certificate_path }}/{{ item.key }}.crt;
            ssl_certificate_key {{ nginx.ssl.private_key_path }}/{{ item.key }}.key;
            
            location / {
              try_files $uri $uri/ =404;
            }
            
            access_log /var/log/nginx/{{ item.key }}_access.log;
            error_log /var/log/nginx/{{ item.key }}_error.log;
          }
        dest: "/tmp/molecule_test/etc/nginx/sites-available/{{ item.key }}"
        mode: "0644"
      loop: "{{ nginx.sites | dict2items }}"

    # Create symlinks for sites-enabled
    - name: Create symlinks for sites-enabled
      ansible.builtin.file:
        src: "/tmp/molecule_test/etc/nginx/sites-available/{{ item.key }}"
        dest: "/tmp/molecule_test/etc/nginx/sites-enabled/{{ item.key }}"
        state: link
      loop: "{{ nginx.sites | dict2items }}"

