      loop: "{{ nginx.sites | dict2items }}"

    # Create fail2ban configuration
    - name: Create fail2ban jail.local
      ansible.builtin.copy:
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5
          
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          
          [nginx-http-auth]
          enabled = true
          port = http,https
          filter = nginx-http-auth
          logpath = /var/log/nginx/*error.log
          maxretry = 3
        dest: /tmp/molecule_test/etc/fail2ban/jail.local
        mode: "0644"

    # Create sysctl security configuration
    - name: Create sysctl security configuration
      ansible.builtin.copy:
        content: |
          # IP Spoofing protection
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.default.rp_filter = 1
          
          # Block SYN attacks
          net.ipv4.tcp_syncookies = 1
          net.ipv4.tcp_max_syn_backlog = 2048
          net.ipv4.tcp_synack_retries = 2
          net.ipv4.tcp_syn_retries = 5
          
          # Do not accept ICMP redirects
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.conf.default.accept_redirects = 0
          net.ipv6.conf.all.accept_redirects = 0
          net.ipv6.conf.default.accept_redirects = 0
          
          # Do not send ICMP redirects
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.default.send_redirects = 0
        dest: /tmp/molecule_test/etc/sysctl.d/99-security.conf
        mode: "0644"

    # Create SSH configuration
    - name: Create SSH configuration
      ansible.builtin.copy:
        content: |
          # SSH hardening configuration
          PermitRootLogin no
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          UsePAM yes
          X11Forwarding no
          PrintMotd no
        dest: /tmp/molecule_test/etc/ssh/sshd_config
        mode: "0644"

    # Create index.html files for each site
    - name: Create index.html files
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>{{ item.key }}</title>
          </head>
          <body>
            <h1>Welcome to {{ item.key }}</h1>
            <p>This is a test page for {{ item.key }}</p>
          </body>
          </html>
        dest: "{{ item.value.document_root }}/index.html"
        mode: "0644"
      loop: "{{ nginx.sites | dict2items }}"