- name: Create Redis configuration files
  ansible.builtin.template:
    src: redis.conf.j2
    dest: '{{ redis_conf_dir }}/{{ item.port }}.conf'
    owner: '{{ redis_user }}'
    group: '{{ redis_group }}'
    mode: '0644'
  loop: '{{ redis_instances }}'
  notify: Restart redis
  tags:
  - redis
  - cache
- name: Create systemd service files for Redis instances
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /etc/systemd/system/redis@.service
    owner: root
    group: root
    mode: '0644'
  when: ansible_service_mgr == 'systemd'
  notify: Restart redis
  tags:
  - redis
  - cache
- name: Create init.d service files for Redis instances
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis{{ item.port }}
    owner: root
    group: root
    mode: '0755'
  loop: '{{ redis_instances }}'
  when: ansible_service_mgr != 'systemd'
  notify: Restart redis init
  tags:
  - redis
  - cache
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_service_mgr == 'systemd'
  tags:
  - redis
  - cache
