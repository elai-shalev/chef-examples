- name: Ensure Redis service is enabled and running
  ansible.builtin.service:
    name: redis_{{ item.port }}
    enabled: true
    state: started
  loop: '{{ redis_instances }}'
  tags:
  - redis
  - service
- name: Restart Redis service if configuration changed
  ansible.builtin.service:
    name: redis_{{ item.port }}
    state: restarted
  loop: '{{ redis_instances }}'
  when: redis_config_updated is defined and redis_config_updated
  tags:
  - redis
  - service
