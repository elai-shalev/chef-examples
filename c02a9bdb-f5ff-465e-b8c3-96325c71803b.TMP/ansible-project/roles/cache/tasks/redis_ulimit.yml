- name: Configure PAM limits for Redis user
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: '{{ redis_user }} soft nofile 65536'
    regexp: ^{{ redis_user }} soft nofile
    state: present
  tags:
  - redis
  - cache
- name: Configure PAM limits for Redis user (hard)
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: '{{ redis_user }} hard nofile 65536'
    regexp: ^{{ redis_user }} hard nofile
    state: present
  tags:
  - redis
  - cache
- name: Configure PAM for Debian systems
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: session required pam_limits.so
    state: present
  when: ansible_os_family == 'Debian'
  tags:
  - redis
  - cache
- name: Configure PAM for RedHat systems
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    line: session required pam_limits.so
    state: present
  when: ansible_os_family == 'RedHat'
  tags:
  - redis
  - cache
