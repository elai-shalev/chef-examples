---
- name: Include memcached tasks
  ansible.builtin.include_tasks: memcached.yml
  tags:
    - memcached
    - cache
- name: Set Redis server configuration
  ansible.builtin.set_fact:
    redis_servers:
      - port: "6379"
        requirepass: redis_secure_password_123
  tags:
    - redis
    - cache
- name: Create Redis log directory
  ansible.builtin.file:
    path: /var/log/redis
    owner: redis
    group: redis
    mode: "0755"
    state: directory
    recurse: true
  tags:
    - redis
    - cache
- name: Include Redis tasks
  ansible.builtin.include_tasks: redis.yml
  tags:
    - redis
    - cache
- name: Fix Redis configuration
  ansible.builtin.lineinfile:
    path: /etc/redis/6379.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - ^replica-serve-stale-data.*$
    - ^replica-read-only.*$
    - ^repl-ping-replica-period.*$
    - ^client-output-buffer-limit.*$
    - ^replica-priority.*$
  register: redis_config_fix
  tags:
    - redis
    - cache
- name: Restart Redis if configuration was fixed
  ansible.builtin.service:
    name: "{{ 'redis@6379' if ansible_service_mgr == 'systemd' else 'redis6379' }}"
    state: restarted
  when: redis_config_fix.changed
  tags:
    - redis
    - cache
