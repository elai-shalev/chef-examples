---
- name: Create Redis configuration directories
  ansible.builtin.file:
    path: /etc/redis
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  tags:
    - redis
    - cache
- name: Create Redis data directories
  ansible.builtin.file:
    path: /var/lib/redis/{{ item.port | default('6379') }}
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  loop: "{{ redis_servers | default([{'port': '6379'}]) }}"
  tags:
    - redis
    - cache
- name: Create Redis configuration files
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/{{ item.port | default('6379') }}.conf
    owner: redis
    group: redis
    mode: "0644"
  loop: "{{ redis_servers | default([{'port': '6379'}]) }}"
  notify: Restart Redis
  tags:
    - redis
    - cache
- name: Create Redis init scripts (SysV)
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis{{ item.port | default('6379') }}
    owner: root
    group: root
    mode: "0755"
  loop: "{{ redis_servers | default([{'port': '6379'}]) }}"
  when: ansible_service_mgr != 'systemd'
  notify: Restart Redis
  tags:
    - redis
    - cache
- name: Create Redis systemd service files
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /etc/systemd/system/redis@.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_service_mgr == 'systemd'
  notify: Restart Redis
  tags:
    - redis
    - cache
- name: Create Redis systemd service instance files
  ansible.builtin.file:
    src: /etc/systemd/system/redis@.service
    dest: /etc/systemd/system/redis@{{ item.port | default('6379') }}.service
    state: link
  loop: "{{ redis_servers | default([{'port': '6379'}]) }}"
  when: ansible_service_mgr == 'systemd'
  notify: Restart Redis
  tags:
    - redis
    - cache
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_service_mgr == 'systemd'
  tags:
    - redis
    - cache
