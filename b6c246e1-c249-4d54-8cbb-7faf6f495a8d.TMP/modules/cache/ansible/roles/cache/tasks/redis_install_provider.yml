---
- name: Create Redis group
  ansible.builtin.group:
    name: "{{ redis_group | default('redis') }}"
    system: true
    state: present
  tags:
    - redis
    - cache
- name: Install Redis from package
  ansible.builtin.package:
    name: redis
    state: present
  when: not redis_install_from_source | bool
  tags:
    - redis
    - cache
- name: Create source directory
  ansible.builtin.file:
    path: "{{ redis_source_dir | default('/tmp/redis-source') }}"
    state: directory
    mode: "0755"
  when: redis_install_from_source | bool
  tags:
    - redis
    - cache
- name: Download Redis source
  ansible.builtin.get_url:
    url: "{{ redis_source_url }}"
    dest: "{{ redis_source_dir | default('/tmp/redis-source') }}/redis-{{ redis_version }}.tar.gz"
    checksum: sha256:{{ redis_source_sha256 }}
  when: redis_install_from_source | bool
  tags:
    - redis
    - cache
- name: Extract Redis source
  ansible.builtin.unarchive:
    src: "{{ redis_source_dir | default('/tmp/redis-source') }}/redis-{{ redis_version }}.tar.gz"
    dest: "{{ redis_source_dir | default('/tmp/redis-source') }}"
    remote_src: true
    creates: "{{ redis_source_dir | default('/tmp/redis-source') }}/redis-{{ redis_version }}/Makefile"
  when: redis_install_from_source | bool
  tags:
    - redis
    - cache
- name: Compile and install Redis
  ansible.builtin.shell: "cd {{ redis_source_dir | default('/tmp/redis-source') }}/redis-{{ redis_version }}\nmake\nmake install\n"
  args:
    creates: /usr/local/bin/redis-server
  when: redis_install_from_source | bool
  tags:
    - redis
    - cache
