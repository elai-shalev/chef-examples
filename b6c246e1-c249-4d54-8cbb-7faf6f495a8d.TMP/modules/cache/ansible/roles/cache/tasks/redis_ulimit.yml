---
- name: Configure PAM limits for Redis user
  ansible.builtin.template:
    src: redis-limits.conf.j2
    dest: /etc/security/limits.d/redis.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - redis
    - cache
- name: Configure PAM to include limits.d
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: session required pam_limits.so
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - redis
    - cache
- name: Configure PAM to include limits.d (RedHat)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    line: session required pam_limits.so
    state: present
  when: ansible_os_family == "RedHat"
  tags:
    - redis
    - cache
