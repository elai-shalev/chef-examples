---
- name: Install Redis prerequisites for Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - build-essential
      - tcl
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - redis
    - cache
- name: Install Redis prerequisites for RedHat/CentOS
  ansible.builtin.yum:
    name:
      - gcc
      - make
      - tcl
    state: present
  when: ansible_os_family == "RedHat"
  tags:
    - redis
    - cache
