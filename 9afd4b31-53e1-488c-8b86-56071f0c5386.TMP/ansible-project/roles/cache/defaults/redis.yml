---
redis_version: 6.2.6
redis_install_from: source
redis_checksum: ""
redis_user: redis
redis_group: redis
redis_home_dir: /var/lib/redis
redis_maxclients: 10000
redis_servers:
  - port: 6379
    name: "6379"
    datadir: /var/lib/redis/6379
    logdir: /var/log/redis
    loglevel: notice
    maxmemory: ""
    maxmemory_policy: volatile-lru
    requirepass: ""
    unixsocket: ""
    unixsocketperm: "755"
redis_timeout: 0
redis_tcp_backlog: 511
redis_tcp_keepalive: 0
redis_databases: 16
redis_save:
  - 900 1
  - 300 10
  - 60 10000
redis_stop_writes_on_bgsave_error: "yes"
redis_rdbcompression: "yes"
redis_rdbchecksum: "yes"
redis_slave_serve_stale_data: "yes"
redis_slave_read_only: "yes"
redis_repl_diskless_sync: "no"
redis_repl_diskless_sync_delay: 5
redis_repl_disable_tcp_nodelay: "no"
redis_slave_priority: 100
redis_appendonly: "no"
redis_appendfsync: everysec
redis_no_appendfsync_on_rewrite: "no"
redis_auto_aof_rewrite_percentage: 100
redis_auto_aof_rewrite_min_size: 64mb
redis_aof_load_truncated: "yes"
redis_lua_time_limit: 5000
redis_slowlog_log_slower_than: 10000
redis_slowlog_max_len: 128
redis_notify_keyspace_events: ""
redis_hash_max_ziplist_entries: 512
redis_hash_max_ziplist_value: 64
redis_list_max_ziplist_entries: 512
redis_list_max_ziplist_value: 64
redis_set_max_intset_entries: 512
redis_zset_max_ziplist_entries: 128
redis_zset_max_ziplist_value: 64
redis_hll_sparse_max_bytes: 3000
redis_activerehashing: "yes"
redis_client_output_buffer_limit_normal: 0 0 0
redis_client_output_buffer_limit_slave: 256mb 64mb 60
redis_client_output_buffer_limit_pubsub: 32mb 8mb 60
redis_hz: 10
redis_aof_rewrite_incremental_fsync: "yes"
