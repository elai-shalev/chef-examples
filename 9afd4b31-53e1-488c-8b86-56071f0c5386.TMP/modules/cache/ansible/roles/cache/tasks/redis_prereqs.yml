---
- name: Install Redis build dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - build-essential
      - tcl8.5
      - make
      - gcc
    state: present
  when: ansible_os_family == "Debian"
- name: Install Redis build dependencies (RedHat/CentOS)
  ansible.builtin.yum:
    name:
      - make
      - gcc
      - tcl
      - tcl-devel
    state: present
  when: ansible_os_family == "RedHat"
- name: Install build-essential package
  ansible.builtin.package:
    name: build-essential
    state: present
  when: ansible_os_family == "Debian" and redis_build_essential | default(true)
