---
- name: Include memcached tasks
  ansible.builtin.import_tasks: memcached.yml
- name: Set Redis server configuration
  ansible.builtin.set_fact:
    redis_servers:
      - port: "6379"
        requirepass: redis_secure_password_123
- name: Create Redis log directory
  ansible.builtin.file:
    path: /var/log/redis
    owner: redis
    group: redis
    mode: "0755"
    state: directory
    recurse: true
- name: Include Redis prerequisites tasks
  ansible.builtin.import_tasks: redis_prereqs.yml
- name: Include Redis installation tasks
  ansible.builtin.import_tasks: redis_install.yml
- name: Include Redis ulimit tasks
  ansible.builtin.import_tasks: redis_ulimit.yml
- name: Include Redis disable OS default tasks
  ansible.builtin.import_tasks: redis_disable_os_default.yml
- name: Include Redis configuration tasks
  ansible.builtin.import_tasks: redis_configure.yml
- name: Fix Redis configuration
  ansible.builtin.lineinfile:
    path: /etc/redis/6379.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - ^replica-serve-stale-data.*$
    - ^replica-read-only.*$
    - ^repl-ping-replica-period.*$
    - ^client-output-buffer-limit.*$
    - ^replica-priority.*$
- name: Include Redis enable tasks
  ansible.builtin.import_tasks: redis_enable.yml
