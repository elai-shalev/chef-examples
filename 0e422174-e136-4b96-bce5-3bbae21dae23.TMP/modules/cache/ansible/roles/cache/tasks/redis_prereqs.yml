---
- name: Install Redis prerequisites for Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - build-essential
      - tcl
      - procps
    state: present
  when: ansible_os_family == "Debian"
- name: Install Redis prerequisites for RedHat/CentOS
  ansible.builtin.yum:
    name:
      - gcc
      - make
      - tcl
      - procps
    state: present
  when: ansible_os_family == "RedHat"
