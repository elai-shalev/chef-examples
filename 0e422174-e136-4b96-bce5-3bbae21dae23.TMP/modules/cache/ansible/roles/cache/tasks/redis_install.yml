---
- name: Create Redis user
  ansible.builtin.user:
    name: redis
    system: true
    shell: /bin/false
    home: /var/lib/redis
    create_home: true
- name: Create Redis directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  loop:
    - /var/lib/redis
    - /etc/redis
    - /var/run/redis
- name: Download Redis source
  ansible.builtin.get_url:
    url: http://download.redis.io/releases/redis-{{ redis_version | default('3.2.11') }}.tar.gz
    dest: /tmp/redis-{{ redis_version | default('3.2.11') }}.tar.gz
    mode: "0644"
- name: Extract Redis source
  ansible.builtin.unarchive:
    src: /tmp/redis-{{ redis_version | default('3.2.11') }}.tar.gz
    dest: /tmp
    remote_src: true
    creates: /tmp/redis-{{ redis_version | default('3.2.11') }}/Makefile
- name: Compile and install Redis
  ansible.builtin.shell:
    cmd: "cd /tmp/redis-{{ redis_version | default('3.2.11') }}\nmake\nmake install\n"
    creates: /usr/local/bin/redis-server
  environment:
    CFLAGS: -march=native
