---
- name: Create Redis configuration file
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/6379.conf
    owner: redis
    group: redis
    mode: "0644"
  notify: Restart Redis
- name: Create Redis init script (for sysvinit)
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis6379
    owner: root
    group: root
    mode: "0755"
  when: ansible_service_mgr == 'sysvinit'
  notify: Restart Redis
- name: Create Redis upstart script (for upstart)
  ansible.builtin.template:
    src: redis.upstart.conf.j2
    dest: /etc/init/redis6379.conf
    owner: root
    group: root
    mode: "0644"
  when: ansible_service_mgr == 'upstart'
  notify: Restart Redis
- name: Create Redis systemd service (for systemd)
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /etc/systemd/system/redis@.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_service_mgr == 'systemd'
  notify: Restart Redis
