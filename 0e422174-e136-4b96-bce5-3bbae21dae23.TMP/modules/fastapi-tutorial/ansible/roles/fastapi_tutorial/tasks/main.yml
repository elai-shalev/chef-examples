---
- name: Install required packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: /opt/fastapi-tutorial
    owner: root
    group: root
    mode: "0755"
    state: directory
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: https://github.com/dibanez/fastapi_tutorial.git
    dest: /opt/fastapi-tutorial
    version: main
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/fastapi-tutorial/venv
    creates: /opt/fastapi-tutorial/venv
  changed_when: false
- name: Check if requirements are installed
  ansible.builtin.stat:
    path: /opt/fastapi-tutorial/.requirements_installed
  register: req_installed
- name: Install Python dependencies
  ansible.builtin.command:
    cmd: /opt/fastapi-tutorial/venv/bin/pip install -r /opt/fastapi-tutorial/requirements.txt
    chdir: /opt/fastapi-tutorial
  when: not req_installed.stat.exists
  register: pip_install
- name: Mark requirements as installed
  ansible.builtin.file:
    path: /opt/fastapi-tutorial/.requirements_installed
    state: touch
  when: pip_install is changed
- name: Enable and start PostgreSQL service
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
- name: Check if PostgreSQL user exists
  ansible.builtin.shell:
    cmd: sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='fastapi'"
  register: user_exists
  changed_when: false
- name: Create PostgreSQL user
  ansible.builtin.shell:
    cmd: sudo -u postgres psql -c "CREATE USER fastapi WITH PASSWORD 'fastapi_password';"
  when: user_exists.stdout != "1"
- name: Check if PostgreSQL database exists
  ansible.builtin.shell:
    cmd: sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='fastapi_db'"
  register: db_exists
  changed_when: false
- name: Create PostgreSQL database
  ansible.builtin.shell:
    cmd: sudo -u postgres psql -c "CREATE DATABASE fastapi_db OWNER fastapi;"
  when: db_exists.stdout != "1"
- name: Grant privileges on database
  ansible.builtin.shell:
    cmd: sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE fastapi_db TO fastapi;"
  when: db_exists.stdout != "1"
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/fastapi-tutorial/.env
    owner: root
    group: root
    mode: "0644"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
- name: Enable and start FastAPI tutorial service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true
