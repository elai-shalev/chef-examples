---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    # Create base directories for testing
    - name: Create base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/nginx/sites-available
        - /tmp/molecule_test/etc/nginx/sites-enabled
        - /tmp/molecule_test/etc/nginx/conf.d
        - /tmp/molecule_test/etc/fail2ban
        - /tmp/molecule_test/etc/sysctl.d
        - /tmp/molecule_test/etc/ssh
        - /tmp/molecule_test/etc/ssl/certs
        - /tmp/molecule_test/etc/ssl/private
        - /tmp/molecule_test/opt/server/test
        - /tmp/molecule_test/opt/server/ci
        - /tmp/molecule_test/opt/server/status

    # Create mock files that would be created by the role
    - name: Create nginx.conf
      ansible.builtin.copy:
        content: |
          user www-data;
          worker_processes auto;
          pid /run/nginx.pid;
          include /etc/nginx/modules-enabled/*.conf;

          events {
            worker_connections 768;
          }

          http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            include /etc/nginx/conf.d/*.conf;
            include /etc/nginx/sites-enabled/*;
          }
        dest: /tmp/molecule_test/etc/nginx/nginx.conf
        mode: "0644"

    - name: Create security.conf
      ansible.builtin.copy:
        content: |
          # Security settings for nginx
          server_tokens off;
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
        dest: /tmp/molecule_test/etc/nginx/conf.d/security.conf
        mode: "0644"

    - name: Create site configurations
      ansible.builtin.copy:
        content: |
          server {
            listen 80;
            server_name {{ item }};
            return 301 https://$host$request_uri;
          }

          server {
            listen 443 ssl;
            server_name {{ item }};
            
            ssl_certificate /etc/ssl/certs/{{ item }}.crt;
            ssl_certificate_key /etc/ssl/private/{{ item }}.key;
            
            root /opt/server/{{ item.split('.')[0] }};
            index index.html;
            
            location / {
              try_files $uri $uri/ =404;
            }
          }
        dest: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create symlinks for site configurations
      ansible.builtin.file:
        src: "/tmp/molecule_test/etc/nginx/sites-available/{{ item }}"
        dest: "/tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}"
        state: link
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create SSL certificates
      ansible.builtin.copy:
        content: "# Mock SSL certificate for {{ item }}"
        dest: "/tmp/molecule_test/etc/ssl/certs/{{ item }}.crt"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create SSL private keys
      ansible.builtin.copy:
        content: "# Mock SSL private key for {{ item }}"
        dest: "/tmp/molecule_test/etc/ssl/private/{{ item }}.key"
        mode: "0640"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create fail2ban jail.local
      ansible.builtin.copy:
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5
          
          [sshd]
          enabled = true
          
          [nginx-http-auth]
          enabled = true
          
          [nginx-limit-req]
          enabled = true
          
          [nginx-botsearch]
          enabled = true
        dest: /tmp/molecule_test/etc/fail2ban/jail.local
        mode: "0644"

    - name: Create sysctl security config
      ansible.builtin.copy:
        content: |
          # Security settings
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.tcp_syncookies = 1
        dest: /tmp/molecule_test/etc/sysctl.d/99-security.conf
        mode: "0644"

    - name: Create SSH config with security settings
      ansible.builtin.copy:
        content: |
          # SSH config with security settings
          PermitRootLogin no
          PasswordAuthentication no
        dest: /tmp/molecule_test/etc/ssh/sshd_config
        mode: "0644"

    - name: Create index.html files for each site
      ansible.builtin.copy:
        content: "Welcome to {{ item.split('.')[0] }} site!"
        dest: "/tmp/molecule_test/opt/server/{{ item.split('.')[0] }}/index.html"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local