---
- name: Enable and start Redis service (systemd)
  ansible.builtin.systemd:
    name: redis@{{ redis_port | default('6379') }}
    state: started
    enabled: true
  when: redis_init_system == 'systemd'
- name: Enable and start Redis service (init.d)
  ansible.builtin.service:
    name: redis{{ redis_port | default('6379') }}
    state: started
    enabled: true
  when: redis_init_system == 'initd'
