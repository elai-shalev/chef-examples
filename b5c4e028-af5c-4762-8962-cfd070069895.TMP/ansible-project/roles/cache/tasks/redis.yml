---
- name: Include Redis installation tasks
  ansible.builtin.include_tasks: redis_install.yml
- name: Configure Redis
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/redis-{{ redis_port | default('6379') }}.conf
    owner: "{{ redis_user | default('redis') }}"
    group: "{{ redis_group | default('redis') }}"
    mode: "0640"
  notify: Restart redis
- name: Configure Redis systemd service
  ansible.builtin.template:
    src: redis.service.j2
    dest: /etc/systemd/system/redis@{{ redis_port | default('6379') }}.service
    owner: root
    group: root
    mode: "0644"
  when: redis_init_system == 'systemd'
  notify:
    - Reload systemd
    - Restart redis
- name: Ensure Redis service is enabled and running
  ansible.builtin.service:
    name: "{{ 'redis@' + redis_port | default('6379') if redis_init_system == 'systemd' else 'redis' + redis_port | default('6379') }}"
    state: started
    enabled: true
