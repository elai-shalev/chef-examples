---
- name: Include memcached tasks
  ansible.builtin.import_tasks: memcached.yml
- name: Set Redis configuration variables
  ansible.builtin.set_fact:
    redis_servers:
      - port: "6379"
        requirepass: redis_secure_password_123
- name: Create Redis log directory
  ansible.builtin.file:
    path: /var/log/redis
    owner: redis
    group: redis
    mode: "0755"
    state: directory
    recurse: true
- name: Include Redis tasks
  ansible.builtin.import_tasks: redis.yml
- name: Fix Redis configuration file
  ansible.builtin.lineinfile:
    path: /etc/redis/6379.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - ^replica-serve-stale-data.*$
    - ^replica-read-only.*$
    - ^repl-ping-replica-period.*$
    - ^client-output-buffer-limit.*$
    - ^replica-priority.*$
  register: redis_config_fix
- name: Include Redis service tasks
  ansible.builtin.import_tasks: redis_service.yml
