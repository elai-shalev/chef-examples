- name: Create
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Create molecule test directories
    ansible.builtin.file:
      path: /tmp/molecule_test
      state: directory
      mode: '0755'
    register: molecule_dir
  - name: Log molecule directory creation
    ansible.builtin.debug:
      msg: Created molecule test directory at {{ molecule_dir.path }}
