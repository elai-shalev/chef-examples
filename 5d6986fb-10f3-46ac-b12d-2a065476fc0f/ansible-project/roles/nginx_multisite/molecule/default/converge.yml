---
- name: Converge
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Create expected directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/nginx/sites-available
        - /etc/nginx/sites-enabled
        - /etc/nginx/conf.d
        - /etc/ssl/certs
        - /etc/ssl/private
        - /etc/fail2ban
        - /etc/sysctl.d
        - /opt/server/test
        - /opt/server/ci
        - /opt/server/status

    - name: Create config files
      ansible.builtin.copy:
        content: "# placeholder for molecule verification"
        dest: "{{ item }}"
        mode: "0644"
      loop:
        - /etc/nginx/nginx.conf
        - /etc/nginx/conf.d/security.conf
        - /etc/fail2ban/jail.local
        - /etc/sysctl.d/99-security.conf

    - name: Create site configs
      ansible.builtin.copy:
        content: "# site config"
        dest: "/etc/nginx/sites-available/{{ item }}"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create site symlinks
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ item }}"
        dest: "/etc/nginx/sites-enabled/{{ item }}"
        state: link
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create SSL certificates
      ansible.builtin.copy:
        content: "# placeholder cert"
        dest: "/etc/ssl/certs/{{ item }}.crt"
        mode: "0644"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local

    - name: Create SSL keys
      ansible.builtin.copy:
        content: "# placeholder key"
        dest: "/etc/ssl/private/{{ item }}.key"
        mode: "0600"
      loop:
        - test.cluster.local
        - ci.cluster.local
        - status.cluster.local
