- name: Verify
  hosts: all
  gather_facts: false
  tasks:
  - name: Check nginx configuration files
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/nginx/{{ item }}
    register: nginx_files
    loop:
    - nginx.conf
    - conf.d/security.conf
  - name: Assert nginx configuration files exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      fail_msg: Nginx configuration file {{ item.item }} not found
      success_msg: Nginx configuration file {{ item.item }} exists
    loop: '{{ nginx_files.results }}'
  - name: Check site configuration files
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/nginx/sites-available/{{ item }}
    register: site_configs
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Assert site configuration files exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      fail_msg: Site configuration file {{ item.item }} not found
      success_msg: Site configuration file {{ item.item }} exists
    loop: '{{ site_configs.results }}'
  - name: Check site symlinks
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/nginx/sites-enabled/{{ item }}
    register: site_symlinks
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Assert site symlinks exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      - item.stat.islnk
      fail_msg: Site symlink {{ item.item }} not found or not a symlink
      success_msg: Site symlink {{ item.item }} exists
    loop: '{{ site_symlinks.results }}'
  - name: Check SSL certificates
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/ssl/certs/{{ item }}.crt
    register: ssl_certs
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Assert SSL certificates exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      fail_msg: SSL certificate for {{ item.item }} not found
      success_msg: SSL certificate for {{ item.item }} exists
    loop: '{{ ssl_certs.results }}'
  - name: Check SSL private keys
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/ssl/private/{{ item }}.key
    register: ssl_keys
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Assert SSL private keys exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      fail_msg: SSL private key for {{ item.item }} not found
      success_msg: SSL private key for {{ item.item }} exists
    loop: '{{ ssl_keys.results }}'
  - name: Check document root directories
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/server/{{ item.split('.')[0] }}
    register: doc_roots
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Assert document root directories exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      - item.stat.isdir
      fail_msg: Document root for {{ item.item }} not found
      success_msg: Document root for {{ item.item }} exists
    loop: '{{ doc_roots.results }}'
  - name: Check index.html files
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/server/{{ item.split('.')[0] }}/index.html
    register: index_files
    loop:
    - test.cluster.local
    - ci.cluster.local
    - status.cluster.local
  - name: Assert index.html files exist
    ansible.builtin.assert:
      that:
      - item.stat.exists
      fail_msg: index.html for {{ item.item }} not found
      success_msg: index.html for {{ item.item }} exists
    loop: '{{ index_files.results }}'
  - name: Check fail2ban configuration
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/fail2ban/jail.local
    register: fail2ban_config
  - name: Assert fail2ban configuration exists
    ansible.builtin.assert:
      that:
      - fail2ban_config.stat.exists
      fail_msg: fail2ban configuration not found
      success_msg: fail2ban configuration exists
  - name: Check sysctl security configuration
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/sysctl.d/99-security.conf
    register: sysctl_config
  - name: Assert sysctl security configuration exists
    ansible.builtin.assert:
      that:
      - sysctl_config.stat.exists
      fail_msg: sysctl security configuration not found
      success_msg: sysctl security configuration exists
