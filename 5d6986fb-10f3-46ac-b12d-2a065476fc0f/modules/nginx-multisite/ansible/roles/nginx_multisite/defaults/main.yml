---
nginx_user: www-data
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_keepalive_timeout: 65
nginx_client_max_body_size: 64M
ssl_protocols: TLSv1.2 TLSv1.3
ssl_ciphers:
  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
ssl_prefer_server_ciphers: "on"
ssl_session_cache: shared:SSL:10m
ssl_session_timeout: 10m
ssl_session_tickets: "off"
ssl_stapling: "on"
ssl_stapling_verify: "on"
security_headers:
  - X-Frame-Options SAMEORIGIN
  - X-Content-Type-Options nosniff
  - X-XSS-Protection "1; mode=block"
  - Referrer-Policy strict-origin-when-cross-origin
  - Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
fail2ban_enabled: true
fail2ban_ignoreip: 127.0.0.1/8 ::1
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 5
fail2ban_nginx_enabled: true
fail2ban_nginx_port: http,https
fail2ban_nginx_logpath: /var/log/nginx/access.log
fail2ban_nginx_maxretry: 5
sysctl_security_settings:
  net.ipv4.tcp_syncookies: 1
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.default.accept_redirects: 0
  net.ipv4.conf.all.secure_redirects: 0
  net.ipv4.conf.default.secure_redirects: 0
  net.ipv4.conf.all.accept_source_route: 0
  net.ipv4.conf.default.accept_source_route: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.default.send_redirects: 0
  net.ipv6.conf.all.accept_redirects: 0
  net.ipv6.conf.default.accept_redirects: 0
nginx_sites:
  - name: test.cluster.local
    server_name: test.cluster.local
    listen: 443 ssl http2
    root: /opt/server/test
    ssl_certificate: /etc/ssl/certs/test.cluster.local.crt
    ssl_certificate_key: /etc/ssl/private/test.cluster.local.key
    index: index.html index.htm
    locations:
      - path: /
        directives:
          - try_files $uri $uri/ =404
  - name: ci.cluster.local
    server_name: ci.cluster.local
    listen: 443 ssl http2
    root: /opt/server/ci
    ssl_certificate: /etc/ssl/certs/ci.cluster.local.crt
    ssl_certificate_key: /etc/ssl/private/ci.cluster.local.key
    index: index.html index.htm
    locations:
      - path: /
        directives:
          - try_files $uri $uri/ =404
  - name: status.cluster.local
    server_name: status.cluster.local
    listen: 443 ssl http2
    root: /opt/server/status
    ssl_certificate: /etc/ssl/certs/status.cluster.local.crt
    ssl_certificate_key: /etc/ssl/private/status.cluster.local.key
    index: index.html index.htm
    locations:
      - path: /
        directives:
          - try_files $uri $uri/ =404
      - path: /nginx_status
        directives:
          - stub_status on
          - access_log off
          - allow 127.0.0.1
          - deny all
