- name: Restart nginx
  ansible.builtin.service:
    name: nginx
    state: restarted
- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded
- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl -p /etc/sysctl.d/99-security.conf
  register: sysctl_result
  changed_when: false
