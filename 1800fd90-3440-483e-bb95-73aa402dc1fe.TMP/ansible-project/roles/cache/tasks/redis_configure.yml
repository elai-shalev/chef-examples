---
- name: Create Redis instance directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  loop:
    - /var/lib/redis/6379
    - /var/run/redis/6379
- name: Configure Redis instance
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/6379.conf
    owner: redis
    group: redis
    mode: "0644"
  vars:
    redis_port: "6379"
    requirepass: redis_secure_password_123
  notify: Restart redis
- name: Create systemd service file
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /lib/systemd/system/redis@6379.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_service_mgr == 'systemd'
  notify: Restart redis
- name: Create init.d script
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis6379
    owner: root
    group: root
    mode: "0755"
  vars:
    redis_port: "6379"
    requirepass: redis_secure_password_123
  when: ansible_service_mgr == 'sysvinit'
  notify: Restart redis
- name: Create upstart config
  ansible.builtin.template:
    src: redis.upstart.conf.j2
    dest: /etc/init/redis6379.conf
    owner: root
    group: root
    mode: "0644"
  vars:
    redis_port: "6379"
  when: ansible_service_mgr == 'upstart'
  notify: Restart redis
