---
- name: Enable and start Redis service (systemd)
  ansible.builtin.systemd:
    name: redis@6379
    enabled: true
    state: started
  when: ansible_service_mgr == 'systemd'
- name: Enable and start Redis service (init/upstart)
  ansible.builtin.service:
    name: redis6379
    enabled: true
    state: started
  when: ansible_service_mgr != 'systemd'
