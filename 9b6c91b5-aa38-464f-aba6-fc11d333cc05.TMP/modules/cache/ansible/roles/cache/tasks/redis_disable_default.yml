---
- name: Check if default Redis service exists
  ansible.builtin.stat:
    path: /lib/systemd/system/redis-server.service
  register: redis_default_service
  when: ansible_service_mgr == "systemd"
- name: Disable default Redis service (systemd)
  ansible.builtin.systemd:
    name: redis-server
    state: stopped
    enabled: false
  when:
    - ansible_service_mgr == "systemd"
    - redis_default_service.stat.exists | default(false)
- name: Check if default Redis service exists (init)
  ansible.builtin.stat:
    path: /etc/init.d/redis-server
  register: redis_default_init
  when: ansible_service_mgr != "systemd"
- name: Disable default Redis service (init)
  ansible.builtin.service:
    name: redis-server
    state: stopped
    enabled: false
  when:
    - ansible_service_mgr != "systemd"
    - redis_default_init.stat.exists | default(false)
