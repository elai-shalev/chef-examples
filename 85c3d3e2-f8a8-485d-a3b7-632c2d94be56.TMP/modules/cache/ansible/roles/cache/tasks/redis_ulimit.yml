---
- name: Create limits.d directory
  ansible.builtin.file:
    path: /etc/security/limits.d
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Configure Redis ulimit settings
  ansible.builtin.template:
    src: redis-limits.conf.j2
    dest: /etc/security/limits.d/redis.conf
    owner: root
    group: root
    mode: "0644"
- name: Configure PAM limits for Debian/Ubuntu
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: session required pam_limits.so
    state: present
  when: ansible_os_family == "Debian"
- name: Configure PAM limits for RHEL/CentOS
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    line: session required pam_limits.so
    state: present
  when: ansible_os_family == "RedHat"
