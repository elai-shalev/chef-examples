---
- name: Update apt repositories
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == "Debian"
- name: Include Redis prerequisites tasks
  ansible.builtin.import_tasks: redis_prereqs.yml
  when: not redis_package_install | default(true)
- name: Include Redis installation tasks
  ansible.builtin.import_tasks: redis_install.yml
- name: Include Redis ulimit tasks
  ansible.builtin.import_tasks: redis_ulimit.yml
- name: Include Redis disable default tasks
  ansible.builtin.import_tasks: redis_disable_default.yml
- name: Include Redis configuration tasks
  ansible.builtin.import_tasks: redis_configure.yml
