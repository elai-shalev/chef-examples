---
- name: Set Redis configuration variables
  ansible.builtin.set_fact:
    redis_config_name: "{{ redis_instance.name | default('redis_' + (redis_instance.port | default('6379'))) }}"
    redis_config_port: "{{ redis_instance.port | default('6379') }}"
    redis_config_bind: "{{ redis_instance.bind | default('127.0.0.1') }}"
    redis_config_datadir: "{{ redis_instance.datadir | default('/var/lib/redis/' + (redis_instance.port | default('6379'))) }}"
    redis_config_logfile: "{{ redis_instance.logfile | default('/var/log/redis/' + (redis_instance.port | default('6379')) + '.log') }}"
    redis_config_pidfile: "{{ redis_instance.pidfile | default('/var/run/redis/' + (redis_instance.port | default('6379')) + '.pid') }}"
    redis_config_unixsocket: "{{ redis_instance.unixsocket | default('/var/run/redis/' + (redis_instance.port | default('6379')) + '.sock') }}"
    redis_config_maxmemory: "{{ redis_instance.maxmemory | default('') }}"
    redis_config_maxmemory_policy: "{{ redis_instance.maxmemory_policy | default('volatile-lru') }}"
- name: Create Redis data directory
  ansible.builtin.file:
    path: "{{ redis_config_datadir }}"
    state: directory
    owner: "{{ redis_user | default('redis') }}"
    group: "{{ redis_group | default('redis') }}"
    mode: "0755"
- name: Create Redis log directory
  ansible.builtin.file:
    path: "{{ redis_logdir | default('/var/log/redis') }}"
    state: directory
    owner: "{{ redis_user | default('redis') }}"
    group: "{{ redis_group | default('redis') }}"
    mode: "0755"
- name: Create Redis pid directory
  ansible.builtin.file:
    path: "{{ redis_piddir | default('/var/run/redis') }}"
    state: directory
    owner: "{{ redis_user | default('redis') }}"
    group: "{{ redis_group | default('redis') }}"
    mode: "0755"
- name: Create Redis configuration file
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/{{ redis_config_port }}.conf
    owner: "{{ redis_user | default('redis') }}"
    group: "{{ redis_group | default('redis') }}"
    mode: "0644"
  notify: restart redis {{ redis_config_port }}
