---
- name: Enable and start Redis services (systemd)
  ansible.builtin.systemd:
    name: redis@{{ item.port }}
    state: started
    enabled: true
  loop: "{{ redis_servers | default([{'port': '6379'}]) }}"
  when: ansible_service_mgr == "systemd"
- name: Enable and start Redis services (non-systemd)
  ansible.builtin.service:
    name: redis_{{ item.port }}
    state: started
    enabled: true
  loop: "{{ redis_servers | default([{'port': '6379'}]) }}"
  when: ansible_service_mgr != "systemd"
