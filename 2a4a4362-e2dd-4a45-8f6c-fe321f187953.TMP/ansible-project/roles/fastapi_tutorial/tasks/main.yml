---
- name: Install Python 3 and required system packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    owner: root
    group: root
    mode: "0755"
    state: directory
    recurse: true
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ repo_branch }}"
    update: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ app_dir }}/venv
    creates: "{{ app_dir }}/venv"
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    state: present
- name: Configure PostgreSQL service
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
- name: Create database user
  ansible.builtin.command:
    cmd: psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';" || true
  become: true
  become_user: postgres
  changed_when: false
- name: Create database
  ansible.builtin.command:
    cmd: psql -c "CREATE DATABASE {{ db_name }} OWNER {{ db_user }};" || true
  become: true
  become_user: postgres
  changed_when: false
- name: Grant privileges on database
  ansible.builtin.command:
    cmd: psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_user }};" || true
  become: true
  become_user: postgres
  changed_when: false
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    mode: "0644"
    owner: root
    group: root
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd
- name: Enable and start the FastAPI service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true
