---
- name: Install Python 3 and required system packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}"
    owner: root
    group: root
    mode: "0755"
    state: directory
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: "{{ fastapi_repo_url | default('https://github.com/dibanez/fastapi_tutorial.git') }}"
    dest: "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}"
    version: "{{ fastapi_repo_branch | default('main') }}"
    update: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}/venv"
    creates: "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}/venv"
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}/requirements.txt"
    virtualenv: "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}/venv"
    state: present
- name: Configure PostgreSQL service
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
- name: Create database user and database
  ansible.builtin.shell:
    cmd: 'sudo -u postgres psql -c "CREATE USER fastapi WITH PASSWORD ''fastapi_password'';" || true

      sudo -u postgres psql -c "CREATE DATABASE fastapi_db OWNER fastapi;" || true

      sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE fastapi_db TO fastapi;" || true

      '
  changed_when: false
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ fastapi_app_dir | default('/opt/fastapi-tutorial') }}/.env"
    owner: root
    group: root
    mode: "0644"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
- name: Enable and start the FastAPI service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true
