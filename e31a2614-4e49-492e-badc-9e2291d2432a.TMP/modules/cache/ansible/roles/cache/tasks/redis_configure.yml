---
- name: Create Redis configuration directory
  ansible.builtin.file:
    path: /etc/redis
    state: directory
    owner: redis
    group: redis
    mode: "0755"
- name: Create Redis configuration file
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/{{ item.port }}.conf
    owner: redis
    group: redis
    mode: "0644"
  loop: "{{ redis_servers }}"
  notify: restart redis
- name: Setup Redis systemd service
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /etc/systemd/system/redis@.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_service_mgr == "systemd"
  notify: reload systemd
- name: Setup Redis init script
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis{{ item.port }}
    owner: root
    group: root
    mode: "0755"
  loop: "{{ redis_servers }}"
  when: ansible_service_mgr == "sysvinit"
  notify: restart redis
- name: Setup Redis upstart script
  ansible.builtin.template:
    src: redis.upstart.conf.j2
    dest: /etc/init/redis{{ item.port }}.conf
    owner: root
    group: root
    mode: "0644"
  loop: "{{ redis_servers }}"
  when: ansible_service_mgr == "upstart"
  notify: restart redis
