---
- name: Enable and start Redis service (systemd)
  ansible.builtin.systemd:
    name: redis@{{ item.port }}
    state: started
    enabled: true
  loop: "{{ redis_servers }}"
  when: ansible_service_mgr == "systemd"
- name: Enable and start Redis service (init)
  ansible.builtin.service:
    name: redis{{ item.port }}
    state: started
    enabled: true
  loop: "{{ redis_servers }}"
  when: ansible_service_mgr == "sysvinit" or ansible_service_mgr == "upstart"
