---
- name: Install Redis from package on Debian/Ubuntu
  ansible.builtin.apt:
    name: redis-server
    state: present
  when: ansible_os_family == "Debian"
- name: Install Redis from package on RedHat/CentOS
  ansible.builtin.dnf:
    name: redis
    state: present
  when: ansible_os_family == "RedHat"
- name: Ensure Redis group exists
  ansible.builtin.group:
    name: redis
    state: present
- name: Ensure Redis user exists
  ansible.builtin.user:
    name: redis
    group: redis
    home: /var/lib/redis
    shell: /bin/false
    system: true
    state: present
- name: Create Redis directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  loop:
    - /var/lib/redis
    - /etc/redis
    - /var/run/redis
